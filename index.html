<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<!-- Манифестни улаш -->
<link rel="manifest" href="manifest.json">

<!-- iOS (iPhone) учун иконка -->
<link rel="apple-touch-icon" href="iconX.png">

<!-- Браузер ярлиғи учун (Favicon) -->
<link rel="icon" type="image/png" href="iconX.png">

<!-- Телефонда тепа қисми (Статус бар) ранги -->
<meta name="theme-color" content="#0a84ff">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>Х rasxod</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #000000; --card-bg: #1c1c1e; --ios-blur: rgba(28, 28, 30, 0.8);
            --accent: #0a84ff; --red: #ff453a; --green: #32d74b; --orange: #ff9f0a;
            --gray: #8e8e93; --text: #ffffff;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; padding: 0 0 100px 0; overflow-x: hidden;
        }

        .header { padding: 40px 20px 10px; position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); z-index: 100; }
        h1 { font-size: 32px; margin: 0; font-weight: 700; }

        .main-card {
            background: linear-gradient(145deg, #1c1c1e, #2c2c2e);
            margin: 16px; padding: 24px; border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.05); text-align: center;
        }

        /* Progress Bar Styles */
        .limit-container { margin: 20px 0; text-align: left; }
        .limit-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--gray); margin-bottom: 8px; }
        .progress-bg { background: rgba(255,255,255,0.1); height: 6px; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

        .total-amount { font-size: 38px; font-weight: 800; margin: 5px 0; }

        /* Type Selector */
        .type-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .type-btn {
            flex: 1; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); color: var(--gray); font-weight: 600; cursor: pointer;
        }
        .type-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        input {
            background: rgba(255,255,255,0.08); border: none; border-radius: 14px;
            color: #fff; padding: 15px; width: 100%; margin-bottom: 12px; font-size: 16px; box-sizing: border-box;
        }

        .save-btn {
            background: var(--accent); color: #fff; border: none; border-radius: 14px;
            padding: 16px; width: 100%; font-weight: 700; font-size: 16px;
        }

        /* Filter Buttons */
        .filter-group { display: flex; gap: 8px; margin: 15px 16px; }
        .filter-btn {
            flex: 1; background: var(--card-bg); border: none; color: var(--gray);
            padding: 10px; border-radius: 12px; font-size: 13px;
        }
        .filter-btn.active { background: #3a3a3c; color: white; }

        .history-list { margin: 10px 16px; background: var(--card-bg); border-radius: 24px; overflow: hidden; }
        .list-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px; border-bottom: 0.5px solid rgba(255,255,255,0.1);
        }
        .type-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.1); color: var(--gray); margin-left: 5px; }
        .delete-btn { background: none; border: none; color: var(--red); font-size: 18px; padding: 5px; opacity: 0.6; }

        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--ios-blur); backdrop-filter: blur(25px);
            display: flex; padding: 12px 0 env(safe-area-inset-bottom);
            border-top: 0.5px solid rgba(255,255,255,0.1); z-index: 1000;
        }
        .tab-item { flex: 1; text-align: center; color: var(--gray); font-size: 10px; cursor: pointer; }
        .tab-item.active { color: var(--accent); }
        .tab-icon { font-size: 22px; margin-bottom: 4px; }
    </style>
</head>
<body>

<div id="page-main">
    <div class="header"><h1>Ҳисоб</h1></div>
    <div class="main-card">
        <div style="color: var(--gray); font-size: 12px; letter-spacing: 1px;">ЖАМИ ХАРАЖАТ</div>
        <div class="total-amount" id="total-val">0 сўм</div>
        
        <div class="limit-container">
            <div class="limit-info">
                <span>Лимит: <b id="limit-text">5,000,000</b></span>
                <span id="percent-text">0%</span>
            </div>
            <div class="progress-bg"><div id="progress-bar" class="progress-fill"></div></div>
        </div>

        <div class="type-selector">
            <div class="type-btn active" onclick="setType('Нақд', this)">💵 Нақд</div>
            <div class="type-btn" onclick="setType('Карта', this)">💳 Карта</div>
        </div>
        <input type="text" id="f-name" placeholder="Нима сотиб олдингиз?">
        <input type="number" id="f-amt" placeholder="Сумма">
        <button class="save-btn" onclick="addTx()">Қўшиш</button>
    </div>
    <div style="margin: 20px; font-weight: 600;">Охирги харажатлар</div>
    <div id="list" class="history-list"></div>
</div>

<div id="page-chart" style="display: none;">
    <div class="header"><h1>Таҳлил</h1></div>
    <div class="filter-group">
        <button class="filter-btn active" onclick="setFilter('day', this)">Бугун</button>
        <button class="filter-btn" onclick="setFilter('week', this)">Ҳафта</button>
        <button class="filter-btn" onclick="setFilter('month', this)">Ой</button>
    </div>
    <div class="main-card"><canvas id="myChart"></canvas></div>
    <div id="group-list" class="history-list"></div>
</div>

<div class="tab-bar">
    <div class="tab-item active" id="tab-main" onclick="showTab('main')">
        <div class="tab-icon">🏠</div>Асосий
    </div>
    <div class="tab-item" id="tab-chart" onclick="showTab('chart')">
        <div class="tab-icon">📊</div>Таҳлил
    </div>
</div>

<script>
    const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbxFuXTvK8IzuzgNWOp5MUhtd7T57CIueFZcRm8SANZg-kbpytzQjdImxxbJAB7PixmB/exec";
    const MONTHLY_LIMIT = 5000000;
    let txs = [], selectedType = 'Нақд', currentFilter = 'day', myChartObj = null;

    function fmt(n) { return Number(n).toLocaleString('uz-UZ') + " сўм"; }
    
    function setType(t, btn) {
        selectedType = t;
        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function showTab(tab) {
        document.getElementById('page-main').style.display = tab === 'main' ? 'block' : 'none';
        document.getElementById('page-chart').style.display = tab === 'chart' ? 'block' : 'none';
        document.getElementById('tab-main').classList.toggle('active', tab === 'main');
        document.getElementById('tab-chart').classList.toggle('active', tab === 'chart');
        if(tab === 'chart') renderAnalysis();
    }

    async function load() {
        try {
            const r = await fetch(GOOGLE_SHEET_URL);
            const res = await r.json();
            txs = res.history;
            renderMain();
        } catch (e) {
            console.log("Юклашда хатолик");
        }
    }

    function renderMain() {
        const total = txs.reduce((s, t) => s + (Number(t.amt) || 0), 0);
        document.getElementById('total-val').textContent = fmt(total);

        const percent = Math.min((total / MONTHLY_LIMIT) * 100, 100);
        const pBar = document.getElementById('progress-bar');
        pBar.style.width = percent + "%";
        pBar.style.backgroundColor = percent > 90 ? 'var(--red)' : (percent > 70 ? 'var(--orange)' : 'var(--green)');
        document.getElementById('percent-text').textContent = Math.round(percent) + "%";
        document.getElementById('limit-text').textContent = fmt(MONTHLY_LIMIT);

        document.getElementById('list').innerHTML = txs.slice(0, 20).map(t => `
            <div class="list-item">
                <div>
                    <b>${t.name}</b> <span class="type-badge">${t.type || 'Нақд'}</span>
                    <div style="color:gray; font-size:11px">${t.date || ''}</div>
                </div>
                <div style="display:flex; align-items:center; gap:10px">
                    <b style="color:var(--red)">-${fmt(t.amt)}</b>
                    <button class="delete-btn" onclick="deleteTx('${t.name}', '${t.amt}')">✕</button>
                </div>
            </div>
        `).join('');
    }

    function setFilter(f, btn) {
        currentFilter = f;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderAnalysis();
    }

 function renderAnalysis() {
    const now = new Date();
    
    const filtered = txs.filter(t => {
        if (!t.date) return false;

        // Исталган форматдаги санани JavaScript санасига ўгириш
        const tDate = new Date(t.date);
        
        // Агар сана нотўғри бўлса (масалан, матн келиб қолса), ўтказиб юборамиз
        if (isNaN(tDate)) return false;

        // Солиштириш учун вақтни 00:00:00 га туширамиз
        const compareNow = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const compareTDate = new Date(tDate.getFullYear(), tDate.getMonth(), tDate.getDate());

        if (currentFilter === 'day') {
            return compareTDate.getTime() === compareNow.getTime();
        }
        
        if (currentFilter === 'week') {
            const diffDays = (compareNow - compareTDate) / (1000 * 60 * 60 * 24);
            return diffDays >= 0 && diffDays <= 7;
        }
        
        if (currentFilter === 'month') {
            return tDate.getMonth() === now.getMonth() && tDate.getFullYear() === now.getFullYear();
        }
        return true;
    });

    const summary = {};
    filtered.forEach(t => { 
        const name = t.name ? t.name.trim() : "Номаълум";
        summary[name] = (summary[name] || 0) + Number(t.amt); 
    });

    const sorted = Object.entries(summary).sort((a, b) => b[1] - a[1]);

    // Рўйхатни чиқариш
    const groupList = document.getElementById('group-list');
    if (sorted.length === 0) {
        groupList.innerHTML = '<div style="padding:20px; text-align:center; color:gray;">Бу давр учун маълумот топилмади</div>';
    } else {
        groupList.innerHTML = sorted.map(([n, s]) => `
            <div class="list-item">
                <div><b>${n}</b></div>
                <b style="color:var(--red)">-${fmt(s)}</b>
            </div>
        `).join('');
    }

    // Диаграммани чизиш
    const ctx = document.getElementById('myChart').getContext('2d');
    if (myChartObj) myChartObj.destroy();
    
    if (sorted.length > 0) {
        myChartObj = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: sorted.map(i => i[0]),
                datasets: [{ 
                    data: sorted.map(i => i[1]), 
                    backgroundColor: ['#ff453a', '#32d74b', '#0a84ff', '#ff9f0a', '#bf5af2', '#64d2ff'], 
                    borderWidth: 0 
                }]
            },
            options: { 
                plugins: { legend: { display: false } }, 
                cutout: '75%',
                responsive: true,
                maintainAspectRatio: false
            }
        });
    }
}


    async function addTx() {
        const n = document.getElementById('f-name').value, a = document.getElementById('f-amt').value;
        if(!n || !a) return;
        const newTx = {name:n, amt:a, type:selectedType, date: new Date().toLocaleDateString('uz-UZ')};
        txs.unshift(newTx); renderMain();
        document.getElementById('f-name').value = ''; document.getElementById('f-amt').value = '';
        await fetch(GOOGLE_SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(newTx) });
        setTimeout(load, 1500);
    }

    async function deleteTx(name, amt) {
        if(!confirm("Ушбу харажат ўчирилсинми?")) return;
        txs = txs.filter(t => !(t.name === name && t.amt == amt));
        renderMain();
        await fetch(GOOGLE_SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action:'delete', name:name, amt:amt}) });
        setTimeout(load, 1000);
    }

    load();
</script>
</body>
</html>
