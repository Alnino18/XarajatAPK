<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Пул Назорати</title>
    <style>
        :root {
            --bg: #000000;
            --card-bg: #1c1c1e;
            --accent: #0a84ff;
            --red: #ff453a;
            --gray: #8e8e93;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            padding: 0 0 50px 0;
        }

        .header {
            padding: 40px 16px 10px;
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            z-index: 100;
        }

        h1 { font-size: 34px; margin: 0; }

        .main-card {
            background: linear-gradient(145deg, #1c1c1e, #2c2c2e);
            margin: 16px;
            padding: 24px;
            border-radius: 28px;
            text-align: center;
        }

        .total-amount { font-size: 42px; font-weight: 800; margin: 10px 0 20px; }

        input {
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 12px;
            color: #fff;
            padding: 14px;
            width: 100%;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .save-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px;
            width: 100%;
            font-weight: 600;
            font-size: 16px;
        }

        .section-title { margin: 25px 16px 10px; font-size: 20px; font-weight: 600; }

        /* Ойлик статистика карусели */
        .stats-container {
            display: flex;
            gap: 12px;
            padding: 0 16px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .stats-container::-webkit-scrollbar { display: none; }

        .stat-card {
            background: var(--card-bg);
            min-width: 140px;
            padding: 16px;
            border-radius: 20px;
            text-align: center;
            scroll-snap-align: start;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-month { color: var(--gray); font-size: 13px; text-transform: capitalize; }
        .stat-sum { font-size: 17px; font-weight: 600; margin-top: 5px; }

        .history-list { margin: 10px 16px; background: var(--card-bg); border-radius: 20px; overflow: hidden; }
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
        }
        .item-info div:first-child { font-weight: 500; }
        .item-info div:last-child { color: var(--gray); font-size: 12px; }
        .item-amt { color: var(--red); font-weight: 600; }
        .list-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 0.5px solid rgba(255,255,255,0.1);
    position: relative;
}

.delete-btn {
    color: var(--gray);
    background: none;
    border: none;
    font-size: 18px;
    padding: 5px 10px;
    cursor: pointer;
    margin-left: 10px;
    opacity: 0.6;
}

.delete-btn:hover {
    color: var(--red);
    opacity: 1;
}
    </style>
</head>
<body>

<div class="header"><h1>Ҳисоб</h1></div>

<div class="main-card">
    <div style="color:var(--gray); font-size:13px;">УМУМИЙ ХАРАЖАТ</div>
    <div class="total-amount" id="total-val">0 сўм</div>
    <input type="text" id="f-name" placeholder="Нима сотиб олдингиз?">
    <input type="number" id="f-amt" placeholder="Сумма">
    <button class="save-btn" onclick="addTx()">Қўшиш</button>
</div>

<div class="section-title">Ойлик ҳисобот</div>
<div id="stats" class="stats-container">
    </div>

<div class="section-title">Тарих</div>
<div id="list" class="history-list"></div>

<script>
    const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbzh9xXHyvpIEsKkBzFu25PDB6bcBMR9dQFjYHF-8BcELGKLmErWjPMvWzudVdU3ITWd/exec";
    let txs = [];

    const monthNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];

    function fmt(n) { return Number(n).toLocaleString('uz-UZ') + " сўм"; }

    async function load() {
        try {
            const r = await fetch(GOOGLE_SHEET_URL);
            const res = await r.json();
            txs = res.history;
            render(txs);
            renderStats(res.stats);
        } catch (e) { 
            console.error("Хатолик:", e);
            const local = JSON.parse(localStorage.getItem('my_money') || '[]');
            render(local);
        }
    }

    function renderStats(stats) {
        const container = document.getElementById('stats');
        container.innerHTML = Object.keys(stats).map(mY => {
            const [m, Y] = mY.split('.');
            return `
                <div class="stat-card">
                    <div class="stat-month">${monthNames[parseInt(m)-1]} ${Y}</div>
                    <div class="stat-sum">${fmt(stats[mY])}</div>
                </div>
            `;
        }).join('');
    }

    function render(data) {
        // Умумий суммани барча элементлар бўйича ҳисоблаш
        const total = data.reduce((s, t) => s + (Number(t.amt) || 0), 0);
        document.getElementById('total-val').textContent = fmt(total);
        
        const listDiv = document.getElementById('list');
        if (data.length === 0) {
            listDiv.innerHTML = '<div style="padding:20px; text-align:center; color:gray;">Маълумот йўқ</div>';
            return;
        }

        listDiv.innerHTML = data.map(t => `
            <div class="list-item">
                <div class="item-info">
                    <div>${t.name}</div>
                    <div style="color: var(--gray); font-size: 12px;">${t.date || ''}</div>
                </div>
                <div style="display: flex; align-items: center;">
                    <div class="item-amt">-${fmt(t.amt)}</div>
                    <button class="delete-btn" onclick="deleteTx('${t.name}', '${t.amt}')">✕</button>
                </div>
            </div>
        `).join('');
        
        localStorage.setItem('my_money', JSON.stringify(data));
    }

    async function addTx() {
    const n = document.getElementById('f-name').value;
    const a = document.getElementById('f-amt').value;
    if(!n || !a) return;
    
    // Эски маълумотларни сақлаб қолган ҳолда янгисини қўшиш
    const newEntry = { 
        name: n, 
        amt: Number(a), 
        date: new Date().toLocaleString('uz-UZ').slice(0, 17) 
    };
    
    // МУҲИМ: txs массивига янгисини қўшамиз, уни алмаштириб юбормаймиз
    txs.unshift(newEntry); 
    render(txs); // Тарихини қайта чиқариш
    
    document.getElementById('f-name').value = '';
    document.getElementById('f-amt').value = '';

    // Серверга юбориш
    await fetch(GOOGLE_SHEET_URL, { 
        method: 'POST', 
        mode: 'no-cors', 
        body: JSON.stringify({name: n, amt: a}) 
    });
    
    // Бир оз кутиб базадан янги рўйхатни қайта юклаш (статистика учун)
    setTimeout(load, 2000);
}
    
    async function deleteTx(name, amt) {
        if (!confirm("Ушбу харажатни ўчирмоқчимисиз?")) return;
        
        // Маҳаллий рўйхатдан ўчириш (тез ишлаши учун)
        txs = txs.filter(t => !(t.name === name && t.amt == amt));
        render(txs);
        
        try {
            // Google Script-га ўчириш сўровини юбориш
            await fetch(GOOGLE_SHEET_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({action: 'delete', name: name, amt: amt})
            });
            // Статистика қайта ҳисобланиши учун саҳифани янгилаш
            location.reload(); 
        } catch (e) {
            alert("Булутдан ўчиришда хатолик юз берди");
        }
    }

    load();
</script>

</body>
</html>
